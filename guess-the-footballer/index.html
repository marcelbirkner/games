<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Footballer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 0;
    }

    .container {
      max-width: 620px;
      width: 100%;
      padding: 20px;
    }

    .back-link {
      display: inline-block;
      margin-top: 16px;
      margin-bottom: 20px;
      color: #a5b4fc;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }

    h1 { text-align: center; font-size: 2rem; margin-bottom: 6px; }
    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    /* ── MENU ──────────────────────────────── */
    #menu { text-align: center; }
    #menu h2 { font-size: 1.2rem; margin-bottom: 16px; color: #ccc; }

    .region-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .region-btn {
      padding: 14px 10px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .region-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .region-btn.all {
      grid-column: 1 / -1;
      background: rgba(16,185,129,0.2);
      border-color: rgba(16,185,129,0.45);
    }
    .region-btn.all:hover { background: rgba(16,185,129,0.35); }

    /* ── QUIZ ──────────────────────────────── */
    #quiz { display: none; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #6366f1);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      font-size: 0.95rem;
    }
    .score-bar .label  { color: #aaa; }
    .score-bar .value  { font-weight: 700; font-size: 1.1rem; }
    .score-bar .streak { color: #f59e0b; }
    .score-bar .correct-count { color: #10b981; }

    /* Clue card */
    .clue-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 24px;
      text-align: center;
    }

    .clue-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #10b981;
      margin-bottom: 18px;
    }

    .clues-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .clue-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px 16px;
    }

    .clue-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #a78bfa;
    }
    .clue-icon svg { width: 1.5rem; height: 1.5rem; fill: currentColor; }

    .clue-text {
      text-align: left;
    }
    .clue-type {
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .clue-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    /* Options */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      padding: 16px 12px;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      line-height: 1.3;
    }
    .option-btn:hover:not(.disabled) {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .option-btn.correct  { background: rgba(16,185,129,0.3); border-color: #10b981; }
    .option-btn.wrong    { background: rgba(239,68,68,0.25); border-color: #ef4444; }
    .option-btn.reveal   { border-color: #10b981; opacity: 0.8; }
    .option-btn.disabled { cursor: default; pointer-events: none; }

    /* ── RESULT ────────────────────────────── */
    #result { display: none; text-align: center; }

    .result-card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px 30px;
      margin-bottom: 24px;
    }
    .result-card .big-score {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-card .out-of   { font-size: 1.2rem; color: #aaa; margin-top: 4px; }
    .result-card .percentage { font-size: 1.5rem; margin-top: 12px; color: #e2e8f0; }
    .result-card .best-streak { margin-top: 12px; color: #f59e0b; font-size: 1rem; }

    .play-again-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
      margin-top: 8px;
    }
    .play-again-btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="container">
  <a href="../index.html" class="back-link">← Back to Arcade</a>
  <h1>Guess the Footballer</h1>
  <p class="subtitle">Birthplace, country & club — who is this player?</p>

  <!-- MENU -->
  <div id="menu">
    <h2>Choose a region</h2>
    <div class="region-grid">
      <button class="region-btn all"    onclick="startQuiz('all')">All Players</button>
      <button class="region-btn"        onclick="startQuiz('Europe')">Europe</button>
      <button class="region-btn"        onclick="startQuiz('South America')">South America</button>
      <button class="region-btn"        onclick="startQuiz('Africa')">Africa</button>
      <button class="region-btn"        onclick="startQuiz('North America')">North America</button>
      <button class="region-btn"        onclick="startQuiz('Asia')">Asia &amp; Others</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="score-bar">

      <div><span class="label">Question: </span><span class="value" id="qnum">1/10</span></div>
      <div><span class="label">Streak: </span><span class="value streak" id="streak">0</span></div>
    </div>

    <div class="clue-card">

      <div class="clues-grid">
        <div class="clue-row">
          <span class="clue-icon"><svg viewBox="0 0 16 16"><path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10m0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6"/></svg></span>

          <div class="clue-text">
            <div class="clue-type">Country</div>
            <div class="clue-value" id="clue-country">—</div>
          </div>
        </div>
        <div class="clue-row">
          <span class="clue-icon"><svg viewBox="0 0 16 16"><path d="M4 2.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zm3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zm3.5-.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5zM4 5.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zM7.5 5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5zm2.5.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zM4.5 8a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5zm2.5.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zm3.5-.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5z"/><path d="M2 1a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1zm11 0H3v14h3v-2.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5V15h3z"/></svg></span>
          <div class="clue-text">
            <div class="clue-type">Notable Club</div>
            <div class="clue-value" id="clue-club">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="options" id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="result-card">
      <div class="big-score" id="final-score">0</div>
      <div class="out-of" id="final-total">out of 10</div>
      <div class="percentage" id="final-pct">0%</div>
      <div class="best-streak" id="final-streak">Best streak: 0</div>
      <div class="best-streak" id="res-best" style="margin-top:8px;color:#a5b4fc"></div>
    </div>
    <button class="play-again-btn" onclick="backToMenu()">Play Again</button>
  </div>
</div>

// Remove duplicate Zlatan entry (keep the PSG one)
const seen = new Set();
const PLAYERS_DEDUPED = PLAYERS.filter(p => {
  if (seen.has(p.name)) return false;
  seen.add(p.name);
  return true;
});

let pool = [], questions = [], currentQ = 0;
let score = 0, streak = 0, bestStreak = 0, totalQuestions = 10;
let answered = false;
let currentRegion = 'all';

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz(region) {
  currentRegion = region;
  pool = region === 'all'
    ? [...PLAYERS_DEDUPED]
    : PLAYERS_DEDUPED.filter(p => p.region === region);

  if (pool.length < 4) {
    alert('Not enough players in this region yet. Try another!');
    return;
  }

  totalQuestions = Math.min(pool.length, 12);
  questions = shuffle([...pool]).slice(0, totalQuestions);
  currentQ = 0; score = 0; streak = 0; bestStreak = 0;

  document.getElementById('menu').style.display   = 'none';
  document.getElementById('quiz').style.display   = 'block';
  document.getElementById('result').style.display = 'none';

  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];

  document.getElementById('score').textContent    = score;
  document.getElementById('qnum').textContent     = `${currentQ + 1}/${totalQuestions}`;
  document.getElementById('streak').textContent   = streak;
  document.getElementById('progress').style.width = `${(currentQ / totalQuestions) * 100}%`;

  document.getElementById('clue-city').textContent    = q.city;
  document.getElementById('clue-country').textContent = q.country;
  document.getElementById('clue-club').textContent    = q.club;

  // Build 4 options: 1 correct + 3 distractors from the full pool
  const others = shuffle(PLAYERS_DEDUPED.filter(p => p.name !== q.name));
  const distractors = others.slice(0, 3);
  const options = shuffle([q, ...distractors]);

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.name;
    btn.addEventListener('click', () => handleAnswer(btn, opt.name === q.name, q.name));
    optionsEl.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, correctName) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));

  if (isCorrect) {
    btn.classList.add('correct');
    score++; streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.textContent === correctName) b.classList.add('reveal');
    });
  }

  document.getElementById('score').textContent  = score;
  document.getElementById('streak').textContent = streak;

  setTimeout(() => {
    currentQ++;
    if (currentQ < totalQuestions) showQuestion();
    else showResult();
  }, 1400);
}

function showResult() {
  const isRecord  = ArcadeScores.save('guess-the-footballer', score);
  const bestEntry = ArcadeScores.get('guess-the-footballer');
  document.getElementById('quiz').style.display   = 'none';
  document.getElementById('result').style.display = 'block';
  const pct = Math.round((score / totalQuestions) * 100);
  document.getElementById('final-score').textContent  = score;
  document.getElementById('final-total').textContent  = `out of ${totalQuestions}`;
  document.getElementById('final-pct').textContent    = `${pct}%`;
  document.getElementById('final-streak').textContent = `Best streak: ${bestStreak}`;
  const bestEl = document.getElementById('res-best');
  if (isRecord) bestEl.textContent = '🏆 New Record!';
  else if (bestEntry) bestEl.textContent = `🏆 Best: ${bestEntry.score} correct`;
  else bestEl.textContent = '';
}

function backToMenu() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display   = 'none';
  document.getElementById('menu').style.display   = 'block';
}
