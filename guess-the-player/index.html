<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 16px;
      margin-bottom: 20px;
      color: #a5b4fc;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }

    /* Menu screen */
    #menu { text-align: center; }

    #menu h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #ccc;
    }

    .country-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .country-btn {
      padding: 14px 10px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .country-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .country-btn.all {
      grid-column: 1 / -1;
      background: rgba(16, 185, 129, 0.25);
      border-color: rgba(16, 185, 129, 0.5);
    }

    .country-btn.all:hover {
      background: rgba(16, 185, 129, 0.4);
    }

    /* Quiz screen */
    #quiz { display: none; }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      font-size: 0.95rem;
    }

    .score-bar .label { color: #aaa; }
    .score-bar .value { font-weight: 700; font-size: 1.1rem; }
    .streak { color: #f59e0b; }
    .correct-count { color: #10b981; }

    .player-display {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 28px;
    }

    .player-display img {
      width: 180px;
      min-width: 180px;
      height: 230px;
      object-fit: cover;
      object-position: top;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 3px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      padding: 16px;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .option-btn:hover:not(.disabled) {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
    }

    .option-btn.correct {
      background: rgba(16, 185, 129, 0.3);
      border-color: #10b981;
    }

    .option-btn.wrong {
      background: rgba(239, 68, 68, 0.3);
      border-color: #ef4444;
    }

    .option-btn.disabled {
      cursor: default;
      opacity: 0.7;
    }

    .option-btn.reveal {
      border-color: #10b981;
      opacity: 1;
    }

    /* Result screen */
    #result { display: none; text-align: center; }

    .result-card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px 30px;
      margin-bottom: 24px;
    }

    .result-card .big-score {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .result-card .out-of {
      font-size: 1.2rem;
      color: #aaa;
      margin-top: 4px;
    }

    .result-card .percentage {
      font-size: 1.5rem;
      margin-top: 12px;
      color: #e2e8f0;
    }

    .result-card .best-streak {
      margin-top: 12px;
      color: #f59e0b;
      font-size: 1rem;
    }

    .play-again-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .play-again-btn:hover {
      transform: translateY(-2px);
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #6366f1);
      border-radius: 2px;
      transition: width 0.3s;
    }

    .img-error {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 180px;
      min-width: 180px;
      height: 230px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 3px solid rgba(255,255,255,0.1);
      color: #666;
      font-size: 4rem;
    }

    .player-info {
      flex: 1;
      min-width: 0;
      padding: 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      text-align: left;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .player-info .info-name {
      display: none;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.4);
      color: #a5b4fc;
      animation: fadeIn 0.3s ease;
    }

    .player-info .info-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .player-info .info-label {
      color: #888;
      white-space: nowrap;
      min-width: 55px;
    }

    .player-info .info-value {
      color: #ddd;
    }

    .player-info .info-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .player-info .tag {
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #c4b5fd;
    }

    .player-info .tag.title-tag {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.3);
      color: #fbbf24;
    }
  </style>
</head>

  <div class="container">
    <a href="../index.html" class="back-link">← Back to Arcade</a>
    <h1>Guess the Player</h1>

    <!-- Menu -->
    <div id="menu">

        <button class="country-btn" onclick="startQuiz('England')"><svg viewBox="0 0 60 30" style="width:1.4em;height:.7em;display:inline-block;vertical-align:-.1em;border-radius:2px" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="30" fill="#fff"/><rect width="60" height="6" y="12" fill="#CE1124"/><rect width="6" height="30" x="27" fill="#CE1124"/></svg> England</button>
        <button class="country-btn" onclick="startQuiz('Portugal')"><svg viewBox="0 0 3 2" style="width:1.4em;height:.93em;display:inline-block;vertical-align:-.1em;border-radius:2px" xmlns="http://www.w3.org/2000/svg"><rect width="3" height="2" fill="#FF0000"/><rect width="1.2" height="2" fill="#006600"/></svg> Portugal</button>
        <button class="country-btn" onclick="startQuiz('Italy')"><svg viewBox="0 0 3 2" style="width:1.4em;height:.93em;display:inline-block;vertical-align:-.1em;border-radius:2px" xmlns="http://www.w3.org/2000/svg"><rect width="1" height="2" fill="#009246"/><rect width="1" height="2" x="1" fill="#fff"/><rect width="1" height="2" x="2" fill="#CE2B37"/></svg> Italy</button>
        <button class="country-btn" onclick="startQuiz('Netherlands')"><svg viewBox="0 0 3 2" style="width:1.4em;height:.93em;display:inline-block;vertical-align:-.1em;border-radius:2px" xmlns="http://www.w3.org/2000/svg"><rect width="3" height="2" fill="#fff"/><rect width="3" height=".67" fill="#AE1C28"/><rect width="3" height=".67" y="1.33" fill="#21468B"/></svg> Netherlands</button>
        <button class="country-btn" onclick="startQuiz('Other')">Other Countries</button>
      </div>
    </div>

    <!-- Quiz -->
    <div id="quiz">
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div class="score-bar">
        <div><span class="label">Score: </span><span class="value correct-count" id="score">0</span></div>
        <div><span class="label">Question: </span><span class="value" id="qnum">1/10</span></div>
        <div><span class="label">Streak: </span><span class="value streak" id="streak">0</span></div>
      </div>
      <div class="player-display">
        <img id="player-img" src="" alt="Soccer player" referrerpolicy="no-referrer">
        <div class="player-info" id="player-info">
          <div class="info-name" id="info-name"></div>
          <div class="info-row"><span class="info-label">Country:</span><span class="info-value" id="player-hint"></span></div>
          <div class="info-row"><span class="info-label">Born:</span><span class="info-value" id="info-born"></span></div>
          <div class="info-row"><span class="info-label">Teams:</span><div class="info-tags" id="info-teams"></div></div>
          <div class="info-row"><span class="info-label">Titles:</span><div class="info-tags" id="info-titles"></div></div>
        </div>
      </div>
      <div class="options" id="options"></div>
    </div>

    <!-- Result -->
    <div id="result">
      <div class="result-card">
        <div class="big-score" id="final-score">0</div>
        <div class="out-of" id="final-total">out of 10</div>
        <div class="percentage" id="final-pct">0%</div>
        <div class="best-streak" id="final-streak">Best streak: 0</div>
        <div class="best-streak" id="res-best" style="margin-top:8px;color:#a5b4fc"></div>
      </div>
      <button class="play-again-btn" onclick="backToMenu()">Play Again</button>
    </div>
  </div>

<script src="../scores.js"></script>

const MAIN_COUNTRIES = ["Argentina","Brazil","France","Germany","Spain","England","Portugal","Italy","Netherlands"];

let pool = [];
let questions = [];
let currentQ = 0;
let score = 0;
let streak = 0;
let bestStreak = 0;
let totalQuestions = 10;
let answered = false;
let currentRegion = 'all';

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz(region) {
  currentRegion = region;
  if (region === 'all') {
    pool = [...PLAYERS];
  } else if (region === 'Other') {
    pool = PLAYERS.filter(p => !MAIN_COUNTRIES.includes(p.country));
  } else {
    pool = PLAYERS.filter(p => p.country === region);
  }

  if (pool.length < 8) return;

  totalQuestions = Math.min(pool.length, region === 'all' ? 20 : 10);
  questions = shuffle([...pool]).slice(0, totalQuestions);
  currentQ = 0;
  score = 0;
  streak = 0;
  bestStreak = 0;

  document.getElementById('menu').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('result').style.display = 'none';

  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];

  document.getElementById('score').textContent = score;
  document.getElementById('qnum').textContent = `${currentQ + 1}/${totalQuestions}`;
  document.getElementById('streak').textContent = streak;
  document.getElementById('progress').style.width = `${((currentQ) / totalQuestions) * 100}%`;

  const img = document.getElementById('player-img');
  img.src = q.img;
  img.style.display = 'block';
  img.onerror = function() {
    this.style.display = 'none';
    const parent = this.parentElement;
    let errDiv = parent.querySelector('.img-error');
    if (!errDiv) {
      errDiv = document.createElement('div');
      errDiv.className = 'img-error';
      errDiv.textContent = '⚽';
      parent.insertBefore(errDiv, this.nextSibling);
    }
  };
  // Remove old error placeholders
  const oldErr = document.querySelector('.img-error');
  if (oldErr) oldErr.remove();

  document.getElementById('player-hint').textContent = q.country;

  // Populate facts panel (name hidden until answered)
  const infoEl = document.getElementById('player-info');
  const nameEl = document.getElementById('info-name');
  nameEl.style.display = 'none';
  nameEl.textContent = '';
  document.getElementById('info-born').textContent = q.born || '';
  const teamsEl = document.getElementById('info-teams');
  teamsEl.innerHTML = '';
  (q.teams || []).forEach(t => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = t;
    teamsEl.appendChild(tag);
  });
  const titlesEl = document.getElementById('info-titles');
  titlesEl.innerHTML = '';
  (q.titles || []).forEach(t => {
    const tag = document.createElement('span');
    tag.className = 'tag title-tag';
    tag.textContent = t;
    titlesEl.appendChild(tag);
  });

  // Build 8 options: 1 correct + 7 wrong from full PLAYERS list (same country preferred)
  const sameCountry = PLAYERS.filter(p => p.name !== q.name && p.country === q.country);
  const diffCountry = PLAYERS.filter(p => p.name !== q.name && p.country !== q.country);
  let wrongPool = shuffle([...sameCountry]).slice(0, 3);
  if (wrongPool.length < 7) {
    wrongPool = wrongPool.concat(shuffle([...diffCountry]).slice(0, 7 - wrongPool.length));
  }
  const wrong = wrongPool.slice(0, 7);
  const options = shuffle([q, ...wrong]);

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.name;
    btn.addEventListener('click', () => handleAnswer(btn, opt.name === q.name, q.name));
    optionsEl.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, correctName) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.classList.add('disabled'));

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    allBtns.forEach(b => {
      if (b.textContent === correctName) b.classList.add('reveal');
    });
  }

  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;

  // Reveal player name
  const q = questions[currentQ];
  const nameEl = document.getElementById('info-name');
  nameEl.textContent = q.name;
  nameEl.style.display = 'block';

  setTimeout(() => {
    currentQ++;
    if (currentQ < totalQuestions) {
      showQuestion();
    } else {
      showResult();
    }
  }, 3000);
}

function showResult() {
  const isRecord  = ArcadeScores.save('guess-the-player', score);
  const bestEntry = ArcadeScores.get('guess-the-player');
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  const pct = Math.round((score / totalQuestions) * 100);
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-total').textContent = `out of ${totalQuestions}`;
  document.getElementById('final-pct').textContent = `${pct}% correct`;
  document.getElementById('final-streak').textContent = `Best streak: ${bestStreak}`;
  document.getElementById('progress').style.width = '100%';
  const bestEl = document.getElementById('res-best');
  if (isRecord) bestEl.textContent = '🏆 New Record!';
  else if (bestEntry) bestEl.textContent = `🏆 Best: ${bestEntry.score} correct`;
  else bestEl.textContent = '';
}

function backToMenu() {
  document.getElementById('menu').style.display = 'block';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}
</script>
