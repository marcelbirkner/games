<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Capital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 20px;
    }

    .back-link {
      display: inline-block;
      margin-top: 16px;
      margin-bottom: 20px;
      color: #a5b4fc;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }

    h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    /* ── MENU ──────────────────────────────── */
    #menu { text-align: center; }

    #menu h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #ccc;
    }

    .continent-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .continent-btn {
      padding: 14px 10px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .continent-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .continent-btn.all {
      grid-column: 1 / -1;
      background: rgba(20,184,166,0.2);
      border-color: rgba(20,184,166,0.45);
    }
    .continent-btn.all:hover { background: rgba(20,184,166,0.35); }

    /* ── QUIZ ──────────────────────────────── */
    #quiz { display: none; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #14b8a6, #6366f1);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      font-size: 0.95rem;
    }
    .score-bar .label  { color: #aaa; }
    .score-bar .value  { font-weight: 700; font-size: 1.1rem; }
    .score-bar .streak { color: #f59e0b; }
    .score-bar .correct-count { color: #10b981; }

    /* Country display */
    .country-display {
      text-align: center;
      margin-bottom: 28px;
    }

    .flag-img {
      width: 240px;
      height: 160px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.5);
      border: 3px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      display: block;
      margin: 0 auto 16px;
    }

    .country-name {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .question-label {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #a5b4fc;
    }

    /* Options */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      padding: 16px 12px;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      line-height: 1.3;
    }
    .option-btn:hover:not(.disabled) {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .option-btn.correct  { background: rgba(16,185,129,0.3); border-color: #10b981; }
    .option-btn.wrong    { background: rgba(239,68,68,0.25);  border-color: #ef4444; }
    .option-btn.reveal   { border-color: #10b981; opacity: 0.8; }
    .option-btn.disabled { cursor: default; pointer-events: none; }

    /* ── RESULT ────────────────────────────── */
    #result { display: none; text-align: center; }

    .result-card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px 30px;
      margin-bottom: 24px;
    }
    .result-card .big-score {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #14b8a6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-card .out-of   { font-size: 1.2rem; color: #aaa; margin-top: 4px; }
    .result-card .percentage { font-size: 1.5rem; margin-top: 12px; color: #e2e8f0; }
    .result-card .best-streak { margin-top: 12px; color: #f59e0b; font-size: 1rem; }

    .play-again-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .play-again-btn:hover { transform: translateY(-2px); }

    .lang-section { text-align: center; margin-bottom: 20px; }
    .lang-btn {
      padding: 8px 22px; border-radius: 99px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06); color: #ccc;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s; margin: 0 4px;
    }
    .lang-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
    .lang-btn.active {
      border-color: #14b8a6; background: rgba(20,184,166,0.15);
      color: #5eead4; box-shadow: 0 0 12px rgba(20,184,166,0.3);
    }
  </style>
</head>
<body>
<div class="container">
  <a href="../index.html" class="back-link">← Back to Arcade</a>
  <h1 id="page-title">Guess the Capital</h1>
  <p class="subtitle" id="page-subtitle">Can you name the capital of every country?</p>

  <!-- MENU -->
  <div id="menu">
    <div class="lang-section">
      <button id="lang-en" class="lang-btn active" onclick="setLang('en')"><svg viewBox="0 0 60 30" style="width:1.4em;height:.7em;display:inline-block;vertical-align:-.1em;border-radius:2px" xmlns="http://www.w3.org/2000/svg"><clipPath id="a"><path d="M0 0v30h60V0z"/></clipPath><clipPath id="b"><path d="M30 15h30v15zv15H0zH0V0zV0h30z"/></clipPath><g clip-path="url(#a)"><path d="M0 0v30h60V0z" fill="#012169"/><path d="M0 0l60 30m0-30L0 30" stroke="#fff" stroke-width="6"/><path d="M0 0l60 30m0-30L0 30" clip-path="url(#b)" stroke="#C8102E" stroke-width="4"/><path d="M30 0v30M0 15h60" stroke="#fff" stroke-width="10"/><path d="M30 0v30M0 15h60" stroke="#C8102E" stroke-width="6"/></g></svg> English</button>
      <button id="lang-de" class="lang-btn"        onclick="setLang('de')"><svg viewBox="0 0 5 3" style="width:1.4em;height:.84em;display:inline-block;vertical-align:-.1em;border-radius:2px" xmlns="http://www.w3.org/2000/svg"><rect width="5" height="3" y="0" fill="#000"/><rect width="5" height="2" y="1" fill="#D00"/><rect width="5" height="1" y="2" fill="#FFCE00"/></svg> Deutsch</button>
    </div>
    <h2 id="menu-heading">Choose a region</h2>
    <div class="continent-grid" id="region-btns">
      <button class="continent-btn all" onclick="startQuiz('all')" data-en="All Countries" data-de="Alle Länder">All Countries</button>
      <button class="continent-btn" onclick="startQuiz('Africa')" data-en="Africa" data-de="Afrika">Africa</button>
      <button class="continent-btn" onclick="startQuiz('Asia')" data-en="Asia" data-de="Asien">Asia</button>
      <button class="continent-btn" onclick="startQuiz('Europe')" data-en="Europe" data-de="Europa">Europe</button>
      <button class="continent-btn" onclick="startQuiz('North America')" data-en="North America" data-de="Nordamerika">North America</button>
      <button class="continent-btn" onclick="startQuiz('South America')" data-en="South America" data-de="Südamerika">South America</button>
      <button class="continent-btn" onclick="startQuiz('Oceania')" data-en="Oceania" data-de="Ozeanien">Oceania</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="score-bar">
      <div><span class="label" id="lbl-score">Score: </span><span class="value correct-count" id="score">0</span></div>
      <div><span class="label" id="lbl-question">Question: </span><span class="value" id="qnum">1/10</span></div>
      <div><span class="label" id="lbl-streak">Streak: </span><span class="value streak" id="streak">0</span></div>
    </div>
    <div class="country-display">
      <img class="flag-img" id="flag-img" src="" alt="Country flag">
      <div class="country-name" id="country-name"></div>
      <div class="question-label" id="question-label">What is the capital city?</div>
    </div>
    <div class="options" id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="result-card">
      <div class="big-score" id="final-score">0</div>
      <div class="out-of" id="final-total">out of 10</div>
      <div class="percentage" id="final-pct">0%</div>
      <div class="best-streak" id="final-streak">Best streak: 0</div>
      <div class="best-streak" id="res-best" style="margin-top:8px;color:#a5b4fc"></div>
    </div>
    <button class="play-again-btn" id="play-again-btn" onclick="backToMenu()">Play Again</button>
  </div>
</div>

<script src="../scores.js"></script>
<script src="../data/countries.js"></script>
<script>
// ─── Language support ─────────────────────────────────────────────────────
let language = 'en';

const UI = {
  en: { title:"Guess the Capital", subtitle:"Can you name the capital of every country?", menu:"Choose a region", score:"Score: ", question:"Question: ", streak:"Streak: ", questionLabel:"What is the capital city?", playAgain:"Play Again", outOf: n => `out of ${n}`, bestStreak: n => `Best streak: ${n}`, pct: p => `${p}%` },
  de: { title:"Rate die Hauptstadt", subtitle:"Kannst du die Hauptstadt jedes Landes nennen?", menu:"Region wählen", score:"Punkte: ", question:"Frage: ", streak:"Serie: ", questionLabel:"Was ist die Hauptstadt?", playAgain:"Nochmal", outOf: n => `von ${n}`, bestStreak: n => `Beste Serie: ${n}`, pct: p => `${p}%` },
};

const DE_NAMES = {
  "Algeria":"Algerien","Angola":"Angola","Benin":"Benin","Botswana":"Botswana","Burkina Faso":"Burkina Faso","Burundi":"Burundi","Cameroon":"Kamerun","Cape Verde":"Kap Verde","Central African Republic":"Zentralafrikanische Republik","Chad":"Tschad","Comoros":"Komoren","Congo":"Kongo","DR Congo":"DR Kongo","Djibouti":"Dschibuti","Egypt":"Ägypten","Equatorial Guinea":"Äquatorialguinea","Eritrea":"Eritrea","Eswatini":"Eswatini","Ethiopia":"Äthiopien","Gabon":"Gabun","Gambia":"Gambia","Ghana":"Ghana","Guinea":"Guinea","Guinea-Bissau":"Guinea-Bissau","Ivory Coast":"Elfenbeinküste","Kenya":"Kenia","Lesotho":"Lesotho","Liberia":"Liberia","Libya":"Libyen","Madagascar":"Madagaskar","Malawi":"Malawi","Mali":"Mali","Mauritania":"Mauretanien","Mauritius":"Mauritius","Morocco":"Marokko","Mozambique":"Mosambik","Namibia":"Namibia","Niger":"Niger","Nigeria":"Nigeria","Rwanda":"Ruanda","Senegal":"Senegal","Seychelles":"Seychellen","Sierra Leone":"Sierra Leone","Somalia":"Somalia","South Africa":"Südafrika","South Sudan":"Südsudan","Sudan":"Sudan","Tanzania":"Tansania","Togo":"Togo","Tunisia":"Tunesien","Uganda":"Uganda","Zambia":"Sambia","Zimbabwe":"Simbabwe",
  "Afghanistan":"Afghanistan","Armenia":"Armenien","Azerbaijan":"Aserbaidschan","Bahrain":"Bahrain","Bangladesh":"Bangladesch","Bhutan":"Bhutan","Brunei":"Brunei","Cambodia":"Kambodscha","China":"China","Georgia":"Georgien","India":"Indien","Indonesia":"Indonesien","Iran":"Iran","Iraq":"Irak","Israel":"Israel","Japan":"Japan","Jordan":"Jordanien","Kazakhstan":"Kasachstan","Kuwait":"Kuwait","Kyrgyzstan":"Kirgisistan","Laos":"Laos","Lebanon":"Libanon","Malaysia":"Malaysia","Maldives":"Malediven","Mongolia":"Mongolei","Myanmar":"Myanmar","Nepal":"Nepal","North Korea":"Nordkorea","Oman":"Oman","Pakistan":"Pakistan","Philippines":"Philippinen","Qatar":"Katar","Saudi Arabia":"Saudi-Arabien","Singapore":"Singapur","South Korea":"Südkorea","Sri Lanka":"Sri Lanka","Syria":"Syrien","Taiwan":"Taiwan","Tajikistan":"Tadschikistan","Thailand":"Thailand","Timor-Leste":"Osttimor","Turkey":"Türkei","Turkmenistan":"Turkmenistan","UAE":"Vereinigte Arabische Emirate","Uzbekistan":"Usbekistan","Vietnam":"Vietnam","Yemen":"Jemen",
  "Albania":"Albanien","Andorra":"Andorra","Austria":"Österreich","Belarus":"Weißrussland","Belgium":"Belgien","Bosnia and Herzegovina":"Bosnien und Herzegowina","Bulgaria":"Bulgarien","Croatia":"Kroatien","Cyprus":"Zypern","Czech Republic":"Tschechische Republik","Denmark":"Dänemark","Estonia":"Estland","Finland":"Finnland","France":"Frankreich","Germany":"Deutschland","Greece":"Griechenland","Hungary":"Ungarn","Iceland":"Island","Ireland":"Irland","Italy":"Italien","Kosovo":"Kosovo","Latvia":"Lettland","Liechtenstein":"Liechtenstein","Lithuania":"Litauen","Luxembourg":"Luxemburg","Malta":"Malta","Moldova":"Moldawien","Monaco":"Monaco","Montenegro":"Montenegro","Netherlands":"Niederlande","North Macedonia":"Nordmazedonien","Norway":"Norwegen","Poland":"Polen","Portugal":"Portugal","Romania":"Rumänien","Russia":"Russland","San Marino":"San Marino","Serbia":"Serbien","Slovakia":"Slowakei","Slovenia":"Slowenien","Spain":"Spanien","Sweden":"Schweden","Switzerland":"Schweiz","Ukraine":"Ukraine","United Kingdom":"Vereinigtes Königreich","Vatican City":"Vatikanstadt",
  "Antigua and Barbuda":"Antigua und Barbuda","Bahamas":"Bahamas","Barbados":"Barbados","Belize":"Belize","Canada":"Kanada","Costa Rica":"Costa Rica","Cuba":"Kuba","Dominica":"Dominica","Dominican Republic":"Dominikanische Republik","El Salvador":"El Salvador","Grenada":"Grenada","Guatemala":"Guatemala","Haiti":"Haiti","Honduras":"Honduras","Jamaica":"Jamaika","Mexico":"Mexiko","Nicaragua":"Nicaragua","Panama":"Panama","Saint Kitts and Nevis":"St. Kitts und Nevis","Saint Lucia":"St. Lucia","Saint Vincent":"St. Vincent","Trinidad and Tobago":"Trinidad und Tobago","United States":"Vereinigte Staaten",
  "Argentina":"Argentinien","Bolivia":"Bolivien","Brazil":"Brasilien","Chile":"Chile","Colombia":"Kolumbien","Ecuador":"Ecuador","Guyana":"Guyana","Paraguay":"Paraguay","Peru":"Peru","Suriname":"Surinam","Uruguay":"Uruguay","Venezuela":"Venezuela",
  "Australia":"Australien","Fiji":"Fidschi","Kiribati":"Kiribati","Marshall Islands":"Marshallinseln","Micronesia":"Mikronesien","Nauru":"Nauru","New Zealand":"Neuseeland","Palau":"Palau","Papua New Guinea":"Papua-Neuguinea","Samoa":"Samoa","Solomon Islands":"Salomonen","Tonga":"Tonga","Tuvalu":"Tuvalu","Vanuatu":"Vanuatu"
};

function displayName(c) {
  return language === 'de' ? (DE_NAMES[c.name] || c.name) : c.name;
}

function setLang(lang) {
  language = lang;
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-de').classList.toggle('active', lang === 'de');
  const U = UI[lang];
  document.getElementById('page-title').textContent      = U.title;
  document.getElementById('page-subtitle').textContent   = U.subtitle;
  document.getElementById('menu-heading').textContent    = U.menu;
  document.getElementById('lbl-score').textContent       = U.score;
  document.getElementById('lbl-question').textContent    = U.question;
  document.getElementById('lbl-streak').textContent      = U.streak;
  document.getElementById('question-label').textContent  = U.questionLabel;
  document.getElementById('play-again-btn').textContent  = U.playAgain;
  document.querySelectorAll('#region-btns button').forEach(btn => {
    btn.textContent = btn.dataset[lang];
  });
}


let pool = [], questions = [], currentQ = 0;
let score = 0, streak = 0, bestStreak = 0, totalQuestions = 10;
let answered = false;
let currentRegion = 'all';

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz(region) {
  currentRegion = region;
  pool = region === 'all' ? [...COUNTRIES] : COUNTRIES.filter(c => c.continent === region);
  if (pool.length < 4) return;

  totalQuestions = Math.min(pool.length, region === 'all' ? 20 : 10);
  questions = shuffle([...pool]).slice(0, totalQuestions);
  currentQ = 0; score = 0; streak = 0; bestStreak = 0;

  document.getElementById('menu').style.display  = 'none';
  document.getElementById('quiz').style.display  = 'block';
  document.getElementById('result').style.display = 'none';

  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];

  document.getElementById('score').textContent    = score;
  document.getElementById('qnum').textContent     = `${currentQ + 1}/${totalQuestions}`;
  document.getElementById('streak').textContent   = streak;
  document.getElementById('progress').style.width = `${(currentQ / totalQuestions) * 100}%`;

  document.getElementById('flag-img').src              = `https://flagcdn.com/w320/${q.code}.png`;
  document.getElementById('country-name').textContent  = displayName(q);

  // Build 4 options: 1 correct + 3 wrong (prefer same continent for harder choices)
  const sameContinent = COUNTRIES.filter(c => c.name !== q.name && c.continent === q.continent);
  const otherContinent = COUNTRIES.filter(c => c.name !== q.name && c.continent !== q.continent);

  let wrongPool = shuffle([...sameContinent]).slice(0, 3);
  if (wrongPool.length < 3) {
    wrongPool = wrongPool.concat(shuffle([...otherContinent]).slice(0, 3 - wrongPool.length));
  }
  const options = shuffle([q, ...wrongPool.slice(0, 3)]);

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.capital;
    btn.addEventListener('click', () => handleAnswer(btn, opt.capital === q.capital, q.capital));
    optionsEl.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, correctCapital) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));

  if (isCorrect) {
    btn.classList.add('correct');
    score++; streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.textContent === correctCapital) b.classList.add('reveal');
    });
  }

  document.getElementById('score').textContent  = score;
  document.getElementById('streak').textContent = streak;

  setTimeout(() => {
    currentQ++;
    if (currentQ < totalQuestions) showQuestion();
    else showResult();
  }, 1200);
}

function showResult() {
  const isRecord  = ArcadeScores.save('guess-the-capital', score);
  const bestEntry = ArcadeScores.get('guess-the-capital');
  document.getElementById('quiz').style.display   = 'none';
  document.getElementById('result').style.display = 'block';
  const pct = Math.round((score / totalQuestions) * 100);
  const U = UI[language];
  document.getElementById('final-score').textContent  = score;
  document.getElementById('final-total').textContent  = U.outOf(totalQuestions);
  document.getElementById('final-pct').textContent    = U.pct(pct);
  document.getElementById('final-streak').textContent = U.bestStreak(bestStreak);
  const bestEl = document.getElementById('res-best');
  if (isRecord) bestEl.textContent = '🏆 New Record!';
  else if (bestEntry) bestEl.textContent = `🏆 Best: ${bestEntry.score} correct`;
  else bestEl.textContent = '';
}

function backToMenu() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display   = 'none';
  document.getElementById('menu').style.display   = 'block';
}
</script>
</body>
</html>
