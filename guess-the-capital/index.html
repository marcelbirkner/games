<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Guess the Capital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 20px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #a5b4fc;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }

    h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    /* ── MENU ──────────────────────────────── */
    #menu { text-align: center; }

    #menu h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #ccc;
    }

    .continent-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .continent-btn {
      padding: 14px 10px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .continent-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .continent-btn.all {
      grid-column: 1 / -1;
      background: rgba(20,184,166,0.2);
      border-color: rgba(20,184,166,0.45);
    }
    .continent-btn.all:hover { background: rgba(20,184,166,0.35); }

    /* ── QUIZ ──────────────────────────────── */
    #quiz { display: none; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #14b8a6, #6366f1);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      font-size: 0.95rem;
    }
    .score-bar .label  { color: #aaa; }
    .score-bar .value  { font-weight: 700; font-size: 1.1rem; }
    .score-bar .streak { color: #f59e0b; }
    .score-bar .correct-count { color: #10b981; }

    /* Country display */
    .country-display {
      text-align: center;
      margin-bottom: 28px;
    }

    .flag-img {
      width: 240px;
      height: 160px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.5);
      border: 3px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      display: block;
      margin: 0 auto 16px;
    }

    .country-name {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .question-label {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #a5b4fc;
    }

    /* Options */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      padding: 16px 12px;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      line-height: 1.3;
    }
    .option-btn:hover:not(.disabled) {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .option-btn.correct  { background: rgba(16,185,129,0.3); border-color: #10b981; }
    .option-btn.wrong    { background: rgba(239,68,68,0.25);  border-color: #ef4444; }
    .option-btn.reveal   { border-color: #10b981; opacity: 0.8; }
    .option-btn.disabled { cursor: default; pointer-events: none; }

    /* ── RESULT ────────────────────────────── */
    #result { display: none; text-align: center; }

    .result-card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px 30px;
      margin-bottom: 24px;
    }
    .result-card .big-score {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #14b8a6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-card .out-of   { font-size: 1.2rem; color: #aaa; margin-top: 4px; }
    .result-card .percentage { font-size: 1.5rem; margin-top: 12px; color: #e2e8f0; }
    .result-card .best-streak { margin-top: 12px; color: #f59e0b; font-size: 1rem; }

    .play-again-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .play-again-btn:hover { transform: translateY(-2px); }
  </style>
</head>

    </div>
    <div class="options" id="options"></div>
  </div>

  <!-- RESULT -->

      <div class="best-streak" id="final-streak">Best streak: 0</div>
    </div>
    <button class="play-again-btn" onclick="backToMenu()">Play Again</button>
  </div>
</div>

let answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz(region) {
  pool = region === 'all' ? [...COUNTRIES] : COUNTRIES.filter(c => c.continent === region);
  if (pool.length < 4) return;

  totalQuestions = Math.min(pool.length, region === 'all' ? 20 : 10);
  questions = shuffle([...pool]).slice(0, totalQuestions);
  currentQ = 0; score = 0; streak = 0; bestStreak = 0;

  document.getElementById('menu').style.display  = 'none';
  document.getElementById('quiz').style.display  = 'block';
  document.getElementById('result').style.display = 'none';

  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];

  document.getElementById('score').textContent    = score;
  document.getElementById('qnum').textContent     = `${currentQ + 1}/${totalQuestions}`;
  document.getElementById('streak').textContent   = streak;
  document.getElementById('progress').style.width = `${(currentQ / totalQuestions) * 100}%`;

  document.getElementById('flag-img').src         = `https://flagcdn.com/w320/${q.code}.png`;
  document.getElementById('country-name').textContent = q.name;

  // Build 4 options: 1 correct + 3 wrong (prefer same continent for harder choices)
  const sameContinent = COUNTRIES.filter(c => c.name !== q.name && c.continent === q.continent);
  const otherContinent = COUNTRIES.filter(c => c.name !== q.name && c.continent !== q.continent);

  let wrongPool = shuffle([...sameContinent]).slice(0, 3);
  if (wrongPool.length < 3) {
    wrongPool = wrongPool.concat(shuffle([...otherContinent]).slice(0, 3 - wrongPool.length));
  }
  const options = shuffle([q, ...wrongPool.slice(0, 3)]);

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.capital;
    btn.addEventListener('click', () => handleAnswer(btn, opt.capital === q.capital, q.capital));
    optionsEl.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, correctCapital) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));

  if (isCorrect) {
    btn.classList.add('correct');
    score++; streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.textContent === correctCapital) b.classList.add('reveal');
    });
  }

  document.getElementById('score').textContent  = score;
  document.getElementById('streak').textContent = streak;

  setTimeout(() => {
    currentQ++;
    if (currentQ < totalQuestions) showQuestion();
    else showResult();
  }, 1200);
}

function showResult() {
  document.getElementById('quiz').style.display   = 'none';
  document.getElementById('result').style.display = 'block';
  const pct = Math.round((score / totalQuestions) * 100);
  document.getElementById('final-score').textContent  = score;
  document.getElementById('final-total').textContent  = `out of ${totalQuestions}`;
  document.getElementById('final-pct').textContent    = `${pct}%`;
  document.getElementById('final-streak').textContent = `Best streak: ${bestStreak} 🔥`;
}

function backToMenu() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display   = 'none';
  document.getElementById('menu').style.display   = 'block';
}
</script>
</body>
</html>
