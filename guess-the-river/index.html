<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the River</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 20px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #a5b4fc;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }

    h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 32px; font-size: 0.95rem; }

    /* ── MENU ──────────────────────────────── */
    #menu { text-align: center; }
    #menu h2 { font-size: 1.2rem; margin-bottom: 16px; color: #ccc; }

    .region-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .region-btn {
      padding: 14px 10px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .region-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .region-btn.all {
      grid-column: 1 / -1;
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.4);
    }
    .region-btn.all:hover { background: rgba(56,189,248,0.32); }

    /* ── QUIZ ──────────────────────────────── */
    #quiz { display: none; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      font-size: 0.95rem;
    }
    .score-bar .label  { color: #aaa; }
    .score-bar .value  { font-weight: 700; font-size: 1.1rem; }
    .score-bar .streak { color: #f59e0b; }
    .score-bar .correct-count { color: #10b981; }

    /* River card */
    .river-card {
      position: relative;
      border-radius: 20px;
      padding: 28px 24px 24px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, rgba(14,165,233,0.14) 0%, rgba(99,102,241,0.1) 100%);
      border: 1px solid rgba(56,189,248,0.22);
      overflow: hidden;
      text-align: center;
    }

    /* Animated waves behind card */
    .river-card::before,
    .river-card::after {
      content: '';
      position: absolute;
      left: -40px;
      right: -40px;
      height: 60px;
      background: rgba(56,189,248,0.06);
      border-radius: 50%;
    }
    .river-card::before { bottom: -30px; animation: wave 6s ease-in-out infinite; }
    .river-card::after  { bottom: -20px; animation: wave 8s ease-in-out infinite reverse; opacity: 0.5; }
    @keyframes wave {
      0%, 100% { transform: translateX(0) scaleY(1); }
      50%       { transform: translateX(15px) scaleY(1.1); }
    }

    .river-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }

    .river-name {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #7dd3fc, #e0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .river-meta {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .river-badge {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 99px;
      letter-spacing: 0.3px;
    }
    .badge-length {
      background: rgba(56,189,248,0.18);
      border: 1px solid rgba(56,189,248,0.3);
      color: #7dd3fc;
    }
    .badge-rank {
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      color: #fcd34d;
    }

    .river-fact {
      font-size: 0.9rem;
      color: #cbd5e1;
      line-height: 1.6;
      font-style: italic;
      position: relative;
      z-index: 1;
    }

    .question-label {
      text-align: center;
      font-size: 0.95rem;
      color: #a5b4fc;
      margin-bottom: 14px;
      font-weight: 600;
    }

    /* Options */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      padding: 16px 12px;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      line-height: 1.3;
    }
    .option-btn:hover:not(.disabled) {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .option-btn.correct  { background: rgba(16,185,129,0.3);  border-color: #10b981; }
    .option-btn.wrong    { background: rgba(239,68,68,0.25);   border-color: #ef4444; }
    .option-btn.reveal   { border-color: #10b981; opacity: 0.8; }
    .option-btn.disabled { cursor: default; pointer-events: none; }

    /* ── RESULT ────────────────────────────── */
    #result { display: none; text-align: center; }

    .result-card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px 30px;
      margin-bottom: 24px;
    }
    .result-card .big-score {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-card .out-of    { font-size: 1.2rem; color: #aaa; margin-top: 4px; }
    .result-card .percentage { font-size: 1.5rem; margin-top: 12px; color: #e2e8f0; }
    .result-card .best-streak { margin-top: 12px; color: #f59e0b; font-size: 1rem; }

    .play-again-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .play-again-btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="container">
  <a href="../index.html" class="back-link">← Back to Arcade</a>
  <h1>🌊 Guess the River</h1>
  <p class="subtitle">Which country does this river flow through?</p>

  <!-- MENU -->
  <div id="menu">
    <h2>Choose a region</h2>
    <div class="region-grid">
      <button class="region-btn all" onclick="startQuiz('all')">🌍 All Rivers (50)</button>
      <button class="region-btn" onclick="startQuiz('Africa')">🌍 Africa</button>
      <button class="region-btn" onclick="startQuiz('Asia')">🌏 Asia</button>
      <button class="region-btn" onclick="startQuiz('Europe')">🌍 Europe</button>
      <button class="region-btn" onclick="startQuiz('North America')">🌎 North America</button>
      <button class="region-btn" onclick="startQuiz('South America')">🌎 South America</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="score-bar">
      <div><span class="label">Score: </span><span class="value correct-count" id="score">0</span></div>
      <div><span class="label">Question: </span><span class="value" id="qnum">1/10</span></div>
      <div><span class="label">Streak: </span><span class="value streak" id="streak">0</span></div>
    </div>

    <div class="river-card">
      <span class="river-icon">🏞️</span>
      <div class="river-name" id="river-name"></div>
      <div class="river-meta">
        <span class="river-badge badge-length" id="river-length"></span>
        <span class="river-badge badge-rank"   id="river-rank"></span>
      </div>
      <p class="river-fact" id="river-fact"></p>
    </div>

    <div class="question-label">Which country does this river flow through?</div>
    <div class="options" id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="result-card">
      <div class="big-score" id="final-score">0</div>
      <div class="out-of" id="final-total">out of 10</div>
      <div class="percentage" id="final-pct">0%</div>
      <div class="best-streak" id="final-streak">Best streak: 0</div>
    </div>
    <button class="play-again-btn" onclick="backToMenu()">Play Again</button>
  </div>
</div>

<script>
// ─── River data ─────────────────────────────────────────────────────────────
// country  = the primary / most-associated country (correct answer)
// allCountries = every country the river flows through (used to exclude from wrong answers)
// rank = approximate rank by length among world's rivers

  { name:"Nile",          country:"Egypt",        allCountries:["Egypt","Sudan","South Sudan","Ethiopia","Uganda","Rwanda","Burundi","DR Congo","Eritrea","Kenya","Tanzania"], length:6650, rank:1,  continent:"Africa",        fact:"The world's longest river, flowing north through the Sahara desert to the Mediterranean Sea." },

  { name:"Yangtze",          country:"China",      allCountries:["China"],                                                          length:6300, rank:3,  continent:"Asia", fact:"The longest river in Asia, flowing entirely within a single country from the Tibetan Plateau to the East China Sea." },

  { name:"Rio Grande",       country:"United States", allCountries:["United States","Mexico"],                                     length:3057, rank:25, continent:"North America", fact:"Stretches over 3,000 km and forms a natural border for roughly half of its course." },
  { name:"Syr Darya",        country:"Kazakhstan", allCountries:["Kazakhstan","Uzbekistan","Tajikistan","Kyrgyzstan"],              length:3078, rank:24, continent:"Asia", fact:"Its waters were so heavily diverted for irrigation during the 20th century that it contributed to a massive environmental disaster." },

// ─── Country pool for wrong answers ─────────────────────────────────────────
const COUNTRY_POOL = {
  "Africa":        ["Egypt","Nigeria","South Africa","Kenya","Morocco","Ghana","Tanzania","Senegal","Zambia","Zimbabwe","Angola","Mozambique","Cameroon","Ivory Coast","Madagascar","Ethiopia","Uganda","Rwanda","Mali","Niger","Algeria","Tunisia","Libya","Somalia","Congo","Gabon","Botswana","Namibia","Sierra Leone","Guinea","Liberia","Sudan","Chad","Malawi","Togo","Benin","Eritrea"],

  "Europe":        ["Russia","Germany","France","United Kingdom","Italy","Spain","Poland","Romania","Netherlands","Belgium","Czech Republic","Hungary","Sweden","Austria","Switzerland","Norway","Finland","Denmark","Portugal","Greece","Ukraine","Belarus","Serbia","Bulgaria","Slovakia","Croatia","Slovenia","Latvia","Lithuania","Estonia","Moldova","Bosnia and Herzegovina","Montenegro","Albania","North Macedonia","Ireland","Iceland","Luxembourg"],
  "North America": ["United States","Canada","Mexico","Guatemala","Honduras","Nicaragua","Costa Rica","Panama","Cuba","Jamaica","Haiti","Dominican Republic","El Salvador","Belize","Trinidad and Tobago"],

// ─── Game state ───────────────────────────────────────────────────────────────
let pool = [], questions = [], currentQ = 0;
let score = 0, streak = 0, bestStreak = 0, totalQuestions = 10;
let answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz(region) {
  pool = region === 'all'
    ? [...RIVERS]
    : RIVERS.filter(r => r.continent === region);

  if (pool.length < 4) return;

  totalQuestions = Math.min(pool.length, region === 'all' ? 20 : 10);
  questions = shuffle([...pool]).slice(0, totalQuestions);
  currentQ = 0; score = 0; streak = 0; bestStreak = 0;

  document.getElementById('menu').style.display   = 'none';
  document.getElementById('quiz').style.display   = 'block';
  document.getElementById('result').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];

  document.getElementById('score').textContent    = score;
  document.getElementById('qnum').textContent     = `${currentQ + 1}/${totalQuestions}`;
  document.getElementById('streak').textContent   = streak;
  document.getElementById('progress').style.width = `${(currentQ / totalQuestions) * 100}%`;

  document.getElementById('river-name').textContent   = q.name;
  document.getElementById('river-length').textContent = `📏 ${q.length.toLocaleString()} km`;
  document.getElementById('river-rank').textContent   = `#${q.rank} longest`;
  document.getElementById('river-fact').textContent   = `"${q.fact}"`;

  // Build 4 options: 1 correct + 3 wrong from same continent
  const sameContinent = (COUNTRY_POOL[q.continent] || []).filter(c => !q.allCountries.includes(c));
  const otherCountries = Object.values(COUNTRY_POOL).flat().filter(c => !q.allCountries.includes(c) && !sameContinent.includes(c));

  let wrongPool = shuffle([...sameContinent]).slice(0, 3);
  if (wrongPool.length < 3) {
    wrongPool = wrongPool.concat(shuffle([...otherCountries]).slice(0, 3 - wrongPool.length));
  }
  const options = shuffle([q.country, ...wrongPool.slice(0, 3)]);

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(btn, opt === q.country, q.country));
    optionsEl.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, correctCountry) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));

  if (isCorrect) {
    btn.classList.add('correct');
    score++; streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.textContent === correctCountry) b.classList.add('reveal');
    });
  }

  document.getElementById('score').textContent  = score;
  document.getElementById('streak').textContent = streak;

  setTimeout(() => {
    currentQ++;
    if (currentQ < totalQuestions) showQuestion();
    else showResult();
  }, 1200);
}

function showResult() {
  document.getElementById('quiz').style.display   = 'none';
  document.getElementById('result').style.display = 'block';
  const pct = Math.round((score / totalQuestions) * 100);
  document.getElementById('final-score').textContent  = score;
  document.getElementById('final-total').textContent  = `out of ${totalQuestions}`;
  document.getElementById('final-pct').textContent    = `${pct}%`;
  document.getElementById('final-streak').textContent = `Best streak: ${bestStreak} 🔥`;
}

function backToMenu() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display   = 'none';
  document.getElementById('menu').style.display   = 'block';
}
</script>
