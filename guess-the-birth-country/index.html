<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess the Birth Country</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      color: #fff;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #a5b4fc;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    h1 {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #f97316, #ef4444, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      text-align: center;
      color: #a5b4fc;
      margin-bottom: 36px;
      font-size: 0.95rem;
    }

    /* Menu */
    #menu { text-align: center; }
    .menu-title {
      font-size: 1.1rem;
      color: #e2e8f0;
      margin-bottom: 20px;
    }
    .menu-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .menu-btn {
      padding: 12px 22px;
      border-radius: 12px;
      border: 2px solid rgba(249,115,22,0.5);
      background: rgba(249,115,22,0.1);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .menu-btn:hover {
      background: rgba(249,115,22,0.3);
      border-color: #f97316;
      transform: translateY(-2px);
    }
    .menu-btn.featured {
      background: linear-gradient(135deg, rgba(249,115,22,0.3), rgba(239,68,68,0.2));
      border-color: #f97316;
      font-size: 1rem;
      padding: 14px 28px;
    }

    /* Quiz */
    #quiz { display: none; }

    .progress-bar-wrap {
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #f97316, #ef4444);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.9rem;
      color: #a5b4fc;
    }
    .score-val { color: #f97316; font-weight: 700; font-size: 1rem; }
    .streak-badge {
      background: rgba(249,115,22,0.2);
      border: 1px solid rgba(249,115,22,0.4);
      border-radius: 99px;
      padding: 2px 12px;
      font-size: 0.8rem;
      color: #fdba74;
    }

    /* Player card */
    .player-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 24px;
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .player-photo {
      width: 130px;
      height: 130px;
      border-radius: 16px;
      object-fit: cover;
      object-position: top center;
      flex-shrink: 0;
      border: 2px solid rgba(249,115,22,0.4);
      background: rgba(255,255,255,0.05);
    }
    .player-info { flex: 1; min-width: 0; }
    .player-name {
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
    }
    .born-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }
    .born-label { color: #94a3b8; }
    .born-city {
      color: #fdba74;
      font-weight: 600;
      font-size: 1rem;
    }
    .question-label {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #e2e8f0;
      font-weight: 600;
    }

    /* Options */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .option-btn {
      padding: 14px 16px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .option-btn:hover:not(:disabled) {
      background: rgba(249,115,22,0.15);
      border-color: rgba(249,115,22,0.5);
      transform: translateY(-1px);
    }
    .option-btn.correct {
      background: rgba(16,185,129,0.25);
      border-color: #10b981;
      color: #6ee7b7;
    }
    .option-btn.wrong {
      background: rgba(239,68,68,0.2);
      border-color: #ef4444;
      color: #fca5a5;
    }
    .option-btn:disabled { cursor: default; }

    /* Feedback */
    .feedback {
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 18px;
      display: none;
    }
    .feedback.correct-fb {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7;
    }
    .feedback.wrong-fb {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }
    .birth-reveal {
      margin-top: 4px;
      font-size: 0.85rem;
      font-weight: 400;
      color: #cbd5e1;
    }

    .next-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      display: none;
    }
    .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* Results */
    #results { display: none; text-align: center; }
    .result-icon { font-size: 4rem; margin-bottom: 12px; }
    .result-score {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(90deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .result-label { color: #a5b4fc; font-size: 1rem; margin-bottom: 28px; }
    .result-msg {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 8px;
    }
    .result-detail { color: #94a3b8; font-size: 0.9rem; margin-bottom: 32px; }
    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .result-btn {
      padding: 12px 28px;
      border-radius: 12px;
      border: 2px solid #f97316;
      background: transparent;
      color: #f97316;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .result-btn.primary {
      background: linear-gradient(135deg, #f97316, #ef4444);
      border-color: transparent;
      color: #fff;
    }
    .result-btn:hover { transform: translateY(-2px); opacity: 0.9; }

    @media (max-width: 520px) {
      .player-card { flex-direction: column; align-items: center; text-align: center; }
      .player-photo { width: 110px; height: 110px; }
      .born-row { justify-content: center; }
      .options { grid-template-columns: 1fr; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>

<div class="container">
  <a href="../index.html" class="back-link">← Back to Arcade</a>
  <h1>⚽ Guess the Birth Country</h1>
  <p class="subtitle">Where in the world was this footballer born?</p>

  <!-- Menu -->
  <div id="menu">
    <p class="menu-title">Choose a continent to quiz on:</p>
    <div class="menu-grid">
      <button class="menu-btn featured" onclick="startQuiz('all')">🌍 All Players</button>
      <button class="menu-btn" onclick="startQuiz('Europe')">🌍 Europe</button>
      <button class="menu-btn" onclick="startQuiz('South America')">🌎 South America</button>
      <button class="menu-btn" onclick="startQuiz('Africa')">🌍 Africa</button>
      <button class="menu-btn" onclick="startQuiz('Asia')">🌏 Asia</button>
      <button class="menu-btn" onclick="startQuiz('North America')">🌎 North & Central America</button>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="score-row">
      <span>Question <span id="q-num">1</span> / <span id="q-total">10</span></span>
      <span class="streak-badge" id="streak-badge">🔥 0 streak</span>
      <span>Score: <span class="score-val" id="score-val">0</span></span>
    </div>

    <div class="player-card">
      <img class="player-photo" id="player-photo" src="" alt="Player photo" />
      <div class="player-info">
        <div class="player-name" id="player-name"></div>
        <div class="born-row">
          <span class="born-label">Born in:</span>
          <span class="born-city" id="born-city"></span>
        </div>
        <div class="question-label">Which country is this city in?</div>
      </div>
    </div>

    <div class="options" id="options"></div>

    <div class="feedback" id="feedback">
      <div id="feedback-text"></div>
      <div class="birth-reveal" id="feedback-detail"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next →</button>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-label" id="result-label"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-detail" id="result-detail"></div>
    <div class="result-actions">
      <button class="result-btn primary" id="play-again-btn" onclick="playAgain()">Play Again</button>
      <button class="result-btn" onclick="showMenu()">Change Squad</button>
    </div>
  </div>
</div>

// All unique birth countries that appear in the dataset
const ALL_BIRTH_COUNTRIES = [...new Set(PLAYERS.map(p => p.born.split(',').pop().trim()))];

const CONTINENT = {
  Argentina: 'South America', Brazil: 'South America', Uruguay: 'South America',
  Colombia: 'South America', Chile: 'South America',
  France: 'Europe', Germany: 'Europe', Spain: 'Europe', England: 'Europe',
  Portugal: 'Europe', Italy: 'Europe', Netherlands: 'Europe', Croatia: 'Europe',
  Poland: 'Europe', Norway: 'Europe', Sweden: 'Europe',
  Egypt: 'Africa', Senegal: 'Africa', Liberia: 'Africa',
  Cameroon: 'Africa', 'Ivory Coast': 'Africa', Morocco: 'Africa',
  'South Korea': 'Asia', Japan: 'Asia',
  'Costa Rica': 'North America', Mexico: 'North America',
};

let pool = [];
let questions = [];
let currentQ = 0;
let score = 0;
let streak = 0;
let bestStreak = 0;
let answered = false;
let currentRegion = 'all';

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function birthCountry(player) {
  return player.born.split(',').pop().trim();
}

function birthCity(player) {
  return player.born.split(',')[0].trim();
}

function startQuiz(region) {
  currentRegion = region;
  if (region === 'all') {
    pool = [...PLAYERS];
  } else {
    pool = PLAYERS.filter(p => CONTINENT[p.country] === region);
  }

  if (pool.length < 4) {
    alert('Not enough players for this region yet!');
    return;
  }

  shuffle(pool);
  const total = Math.min(10, pool.length);
  questions = pool.slice(0, total);
  currentQ = 0;
  score = 0;
  streak = 0;
  bestStreak = 0;

  document.getElementById('menu').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('q-total').textContent = total;

  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];
  const total = questions.length;
  const correctCountry = birthCountry(q);
  const city = birthCity(q);

  document.getElementById('q-num').textContent = currentQ + 1;
  document.getElementById('progress-bar').style.width = ((currentQ / total) * 100) + '%';
  document.getElementById('score-val').textContent = score;
  document.getElementById('streak-badge').textContent = `🔥 ${streak} streak`;
  document.getElementById('player-photo').src = q.img;
  document.getElementById('player-photo').alt = q.name;
  document.getElementById('player-name').textContent = q.name;
  document.getElementById('born-city').textContent = city;

  // Generate 3 wrong answers from all birth countries, excluding correct
  const wrongs = shuffle(ALL_BIRTH_COUNTRIES.filter(c => c !== correctCountry));
  const options = shuffle([correctCountry, ...wrongs.slice(0, 3)]);

  const container = document.getElementById('options');
  container.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(btn, opt, correctCountry, q);
    container.appendChild(btn);
  });

  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
}

function handleAnswer(btn, chosen, correct, q) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  const fbText = document.getElementById('feedback-text');
  const fbDetail = document.getElementById('feedback-detail');

  if (chosen === correct) {
    btn.classList.add('correct');
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    fb.className = 'feedback correct-fb';
    fbText.textContent = '✓ Correct!';
    fbDetail.textContent = `${q.name} was born in ${q.born}`;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    fb.className = 'feedback wrong-fb';
    fbText.textContent = `✗ Wrong! The answer is ${correct}`;
    fbDetail.textContent = `${q.name} was born in ${q.born}`;
  }

  document.getElementById('score-val').textContent = score;
  document.getElementById('streak-badge').textContent = `🔥 ${streak} streak`;
  fb.style.display = 'block';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  const isLast = currentQ === questions.length - 1;
  nextBtn.textContent = isLast ? 'See Results →' : 'Next →';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  let icon, msg, detail;
  if (pct === 100) { icon = '🏆'; msg = 'Perfect Score!'; detail = 'You know exactly where these legends were born!'; }
  else if (pct >= 80) { icon = '⭐'; msg = 'Excellent!'; detail = 'You really know your football geography!'; }
  else if (pct >= 60) { icon = '👍'; msg = 'Good job!'; detail = 'Solid geography knowledge!'; }
  else if (pct >= 40) { icon = '📚'; msg = 'Keep learning!'; detail = 'Some tricky birthplaces in there!'; }
  else { icon = '⚽'; msg = 'Keep practising!'; detail = 'Try again — you\'ll learn those birthplaces!'; }

  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-score').textContent = `${score} / ${total}`;
  document.getElementById('result-label').textContent = `${pct}% correct`;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-detail').textContent = detail + (bestStreak > 1 ? ` Best streak: ${bestStreak}!` : '');

  document.getElementById('play-again-btn').onclick = () => startQuiz(currentRegion);
}

function playAgain() {
  startQuiz(currentRegion);
}

function showMenu() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('menu').style.display = 'block';
}
</script>
</body>
</html>
