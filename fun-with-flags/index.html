<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fun with Flags</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #a5b4fc;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    /* Menu screen */
    #menu { text-align: center; }

    #menu h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #ccc;
    }

    .continent-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .continent-btn {
      padding: 14px 10px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .continent-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .continent-btn.all {
      grid-column: 1 / -1;
      background: rgba(99, 102, 241, 0.25);
      border-color: rgba(99, 102, 241, 0.5);
    }

    .continent-btn.all:hover {
      background: rgba(99, 102, 241, 0.4);
    }

    /* Quiz screen */
    #quiz { display: none; }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      font-size: 0.95rem;
    }

    .score-bar .label { color: #aaa; }
    .score-bar .value { font-weight: 700; font-size: 1.1rem; }
    .streak { color: #f59e0b; }
    .correct-count { color: #10b981; }

    .flag-display {
      text-align: center;
      margin-bottom: 28px;
    }

    .flag-display img {
      width: 260px;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 3px solid rgba(255,255,255,0.1);
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option-btn {
      padding: 16px;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .option-btn:hover:not(.disabled) {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
    }

    .option-btn.correct {
      background: rgba(16, 185, 129, 0.3);
      border-color: #10b981;
    }

    .option-btn.wrong {
      background: rgba(239, 68, 68, 0.3);
      border-color: #ef4444;
    }

    .option-btn.disabled {
      cursor: default;
      opacity: 0.7;
    }

    .option-btn.reveal {
      border-color: #10b981;
      opacity: 1;
    }

    /* Result screen */
    #result { display: none; text-align: center; }

    .result-card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px 30px;
      margin-bottom: 24px;
    }

    .result-card .big-score {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .result-card .out-of {
      font-size: 1.2rem;
      color: #aaa;
      margin-top: 4px;
    }

    .result-card .percentage {
      font-size: 1.5rem;
      margin-top: 12px;
      color: #e2e8f0;
    }

    .result-card .best-streak {
      margin-top: 12px;
      color: #f59e0b;
      font-size: 1rem;
    }

    .play-again-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .play-again-btn:hover {
      transform: translateY(-2px);
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #10b981);
      border-radius: 2px;
      transition: width 0.3s;
    }

    .lang-section { text-align: center; margin-bottom: 20px; }
    .lang-btn {
      padding: 8px 22px; border-radius: 99px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06); color: #ccc;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s; margin: 0 4px;
    }
    .lang-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
    .lang-btn.active {
      border-color: #8b5cf6; background: rgba(139,92,246,0.15);
      color: #c4b5fd; box-shadow: 0 0 12px rgba(139,92,246,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../index.html" class="back-link">← Back to Arcade</a>
    <h1>Fun with Flags</h1>
    <p class="subtitle">How well do you know your country flags?</p>

    <!-- Menu -->
    <div id="menu">
      <div class="lang-section">
        <button id="lang-en" class="lang-btn active" onclick="setLang('en')">🇬🇧 English</button>
        <button id="lang-de" class="lang-btn"        onclick="setLang('de')">🇩🇪 Deutsch</button>
      </div>
      <h2 id="menu-heading">Choose a region</h2>
      <div class="continent-grid" id="region-btns">
        <button class="continent-btn all" onclick="startQuiz('all')" data-en="All Countries" data-de="Alle Länder">All Countries</button>
        <button class="continent-btn" onclick="startQuiz('Africa')" data-en="Africa" data-de="Afrika">Africa</button>
        <button class="continent-btn" onclick="startQuiz('Asia')" data-en="Asia" data-de="Asien">Asia</button>
        <button class="continent-btn" onclick="startQuiz('Europe')" data-en="Europe" data-de="Europa">Europe</button>
        <button class="continent-btn" onclick="startQuiz('North America')" data-en="North America" data-de="Nordamerika">North America</button>
        <button class="continent-btn" onclick="startQuiz('South America')" data-en="South America" data-de="Südamerika">South America</button>
        <button class="continent-btn" onclick="startQuiz('Oceania')" data-en="Oceania" data-de="Ozeanien">Oceania</button>
      </div>
    </div>

    <!-- Quiz -->
    <div id="quiz">
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div class="score-bar">
        <div><span class="label" id="lbl-score">Score: </span><span class="value correct-count" id="score">0</span></div>
        <div><span class="label" id="lbl-question">Question: </span><span class="value" id="qnum">1/10</span></div>
        <div><span class="label" id="lbl-streak">Streak: </span><span class="value streak" id="streak">0</span></div>
      </div>
      <div class="flag-display">
        <img id="flag-img" src="" alt="Country flag">
      </div>
      <div class="options" id="options"></div>
    </div>

    <!-- Result -->
    <div id="result">
      <div class="result-card">
        <div class="big-score" id="final-score">0</div>
        <div class="out-of" id="final-total">out of 10</div>
        <div class="percentage" id="final-pct">0%</div>
        <div class="best-streak" id="final-streak">Best streak: 0</div>
      </div>
      <button class="play-again-btn" id="play-again-btn" onclick="backToMenu()">Play Again</button>
    </div>
  </div>

function displayName(c) {
  return language === 'de' ? (DE_NAMES[c.name] || c.name) : c.name;
}

function setLang(lang) {
  language = lang;
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-de').classList.toggle('active', lang === 'de');
  const U = UI[lang];
  document.getElementById('menu-heading').textContent = U.menu;
  document.getElementById('lbl-score').textContent    = U.score;
  document.getElementById('lbl-question').textContent = U.question;
  document.getElementById('lbl-streak').textContent   = U.streak;
  document.getElementById('play-again-btn').textContent = U.playAgain;
  document.querySelectorAll('#region-btns button').forEach(btn => {
    btn.textContent = btn.dataset[lang];
  });
}

  {name:"Argentina",code:"ar",continent:"South America"},{name:"Bolivia",code:"bo",continent:"South America"},{name:"Brazil",code:"br",continent:"South America"},{name:"Chile",code:"cl",continent:"South America"},{name:"Colombia",code:"co",continent:"South America"},{name:"Ecuador",code:"ec",continent:"South America"},{name:"Guyana",code:"gy",continent:"South America"},{name:"Paraguay",code:"py",continent:"South America"},{name:"Peru",code:"pe",continent:"South America"},{name:"Suriname",code:"sr",continent:"South America"},{name:"Uruguay",code:"uy",continent:"South America"},{name:"Venezuela",code:"ve",continent:"South America"},

  {name:"Australia",code:"au",continent:"Oceania"},{name:"Fiji",code:"fj",continent:"Oceania"},{name:"Kiribati",code:"ki",continent:"Oceania"},{name:"Marshall Islands",code:"mh",continent:"Oceania"},{name:"Micronesia",code:"fm",continent:"Oceania"},{name:"Nauru",code:"nr",continent:"Oceania"},{name:"New Zealand",code:"nz",continent:"Oceania"},{name:"Palau",code:"pw",continent:"Oceania"},{name:"Papua New Guinea",code:"pg",continent:"Oceania"},{name:"Samoa",code:"ws",continent:"Oceania"},{name:"Solomon Islands",code:"sb",continent:"Oceania"},{name:"Tonga",code:"to",continent:"Oceania"},{name:"Tuvalu",code:"tv",continent:"Oceania"},{name:"Vanuatu",code:"vu",continent:"Oceania"}
];

let pool = [];
let questions = [];
let currentQ = 0;
let score = 0;
let streak = 0;
let bestStreak = 0;
let totalQuestions = 10;
let answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function flagUrl(code) {
  return `https://flagcdn.com/w320/${code}.png`;
}

function startQuiz(region) {
  pool = region === 'all' ? [...COUNTRIES] : COUNTRIES.filter(c => c.continent === region);

  if (pool.length < 4) return;

  totalQuestions = Math.min(pool.length, region === 'all' ? 20 : 10);
  questions = shuffle([...pool]).slice(0, totalQuestions);
  currentQ = 0;
  score = 0;
  streak = 0;
  bestStreak = 0;

  document.getElementById('menu').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('result').style.display = 'none';

  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];

  document.getElementById('score').textContent = score;
  document.getElementById('qnum').textContent = `${currentQ + 1}/${totalQuestions}`;
  document.getElementById('streak').textContent = streak;
  document.getElementById('progress').style.width = `${((currentQ) / totalQuestions) * 100}%`;
  document.getElementById('flag-img').src = flagUrl(q.code);

  // Build 4 options: 1 correct + 3 wrong from pool
  const wrong = shuffle(pool.filter(c => c.code !== q.code)).slice(0, 3);
  const options = shuffle([q, ...wrong]);

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = displayName(opt);
    btn.dataset.code = opt.code;
    btn.addEventListener('click', () => handleAnswer(btn, opt.code === q.code, q.code));
    optionsEl.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, correctCode) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.classList.add('disabled'));

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    allBtns.forEach(b => {
      if (b.dataset.code === correctCode) b.classList.add('reveal');
    });
  }

  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;

  setTimeout(() => {
    currentQ++;
    if (currentQ < totalQuestions) {
      showQuestion();
    } else {
      showResult();
    }
  }, 1200);
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  const pct = Math.round((score / totalQuestions) * 100);
  const U = UI[language];
  document.getElementById('final-score').textContent  = score;
  document.getElementById('final-total').textContent  = U.outOf(totalQuestions);
  document.getElementById('final-pct').textContent    = U.pct(pct);
  document.getElementById('final-streak').textContent = U.bestStreak(bestStreak);
  document.getElementById('progress').style.width = '100%';
}

function backToMenu() {
  document.getElementById('menu').style.display = 'block';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}
</script>
