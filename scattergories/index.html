<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scattergories</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    /* Stars */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; background: #fff; border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate; opacity: 0;
    }
    @keyframes twinkle {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 0.8; transform: scale(1.2); }
    }

    .content {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto; padding: 40px 20px 60px;
    }

    /* Back link */
    .back-link {
      display: inline-block;
      margin-top: 16px;
      margin-bottom: 20px;
      color: #a5b4fc;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }

    /* Language toggle */
    .lang-bar {
      display: flex; justify-content: center; margin-bottom: 32px; gap: 10px;
    }
    .lang-btn {
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
      color: #ccc; padding: 8px 22px; border-radius: 99px; cursor: pointer;
      font-size: 0.95rem; font-weight: 700; transition: all 0.2s;
    }
    .lang-btn.active {
      border-color: #6366f1; background: rgba(99,102,241,0.2);
      color: #a5b4fc; box-shadow: 0 0 12px rgba(99,102,241,0.35);
    }
    .lang-btn:hover:not(.active) { border-color: rgba(255,255,255,0.4); color: #fff; }

    /* ============ MENU SCREEN ============ */
    #screen-menu { text-align: center; }
    .game-title {
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 800; margin-bottom: 14px;
      background: linear-gradient(90deg, #a78bfa, #6366f1, #38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .game-subtitle {
      font-size: 1.05rem; color: rgba(255,255,255,0.7);
      max-width: 540px; margin: 0 auto 40px; line-height: 1.5;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; color: #fff; font-size: 1.1rem; font-weight: 700;
      padding: 14px 44px; border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 24px rgba(99,102,241,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(99,102,241,0.6); }
    .btn-primary:active { transform: translateY(0); }

    /* ============ PLAYING SCREEN ============ */
    #screen-play { display: none; }

    .play-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }

    .letter-badge {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      padding: 10px 24px; border-radius: 50px;
      font-size: 1rem; font-weight: 600;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }
    .letter-badge .big-letter {
      font-size: 2rem; font-weight: 900; line-height: 1;
    }

    /* Timer */
    .timer-wrap { text-align: right; min-width: 120px; }
    .timer-display {
      font-size: 1.8rem; font-weight: 800; letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }
    .timer-display.warning { color: #f97316; }
    .timer-display.danger  { color: #ef4444; animation: pulse 0.5s infinite alternate; }
    @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
    .timer-bar-track {
      height: 6px; background: rgba(255,255,255,0.1);
      border-radius: 4px; margin-top: 6px; overflow: hidden;
    }
    .timer-bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      transition: width 1s linear, background 0.5s;
    }
    .timer-bar-fill.warning { background: linear-gradient(90deg, #f97316, #fb923c); }
    .timer-bar-fill.danger  { background: linear-gradient(90deg, #ef4444, #f87171); }

    /* Category rows */
    .categories-grid {
      display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px;
    }
    .cat-row {
      display: grid; grid-template-columns: 1fr 2fr;
      align-items: center; gap: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 12px 16px;
      transition: background 0.2s;
    }
    .cat-row:focus-within { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.4); }
    .cat-label {
      font-size: 0.9rem; font-weight: 600; color: rgba(255,255,255,0.85);
    }
    .cat-input {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: #fff; font-size: 1rem; padding: 8px 14px;
      outline: none; width: 100%; transition: border-color 0.2s, background 0.2s;
    }
    .cat-input::placeholder { color: rgba(255,255,255,0.3); }
    .cat-input:focus { border-color: #6366f1; background: rgba(255,255,255,0.12); }

    /* Submit button */
    .submit-wrap { text-align: center; }
    .btn-submit {
      background: linear-gradient(135deg, #059669, #10b981);
      border: none; color: #fff; font-size: 1rem; font-weight: 700;
      padding: 12px 40px; border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(16,185,129,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(16,185,129,0.55); }

    /* ============ RESULT SCREEN ============ */
    #screen-result { display: none; }

    .result-header { text-align: center; margin-bottom: 32px; }
    .result-title {
      font-size: 1.8rem; font-weight: 800; margin-bottom: 8px;
    }
    .result-letter-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.4);
      padding: 6px 20px; border-radius: 50px; font-size: 1rem;
      margin-bottom: 20px;
    }
    .result-letter-badge .big-letter {
      font-size: 1.6rem; font-weight: 900;
      background: linear-gradient(90deg, #a78bfa, #6366f1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Score display */
    .score-block {
      display: inline-block; text-align: center;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(167,139,250,0.2));
      border: 1px solid rgba(99,102,241,0.4); border-radius: 16px;
      padding: 18px 40px; margin-bottom: 10px;
    }
    .score-number {
      font-size: 3rem; font-weight: 900;
      background: linear-gradient(90deg, #a78bfa, #6366f1, #38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
    }
    .score-label { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .grade-msg { font-size: 1.4rem; font-weight: 700; margin: 12px 0 28px; }

    /* Results table */
    .results-table {
      width: 100%; border-collapse: collapse; margin-bottom: 32px;
    }
    .results-table th {
      text-align: left; font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: rgba(255,255,255,0.5);
      padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .results-table td {
      padding: 10px 12px; font-size: 0.92rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .results-table tr:last-child td { border-bottom: none; }
    .results-table tr:hover td { background: rgba(255,255,255,0.03); }

    .judge-hint {
      text-align: center;
      color: #a5b4fc;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    .td-cat { font-weight: 600; color: rgba(255,255,255,0.85); width: 38%; }
    .td-answer { color: #fff; width: 48%; }
    .td-judge { text-align: right; width: 14%; }

    .judge-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 2px solid;
      background: none;
      font-size: 1rem; line-height: 1;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .judge-btn.counted {
      border-color: #10b981;
      color: #10b981;
      background: rgba(16,185,129,0.12);
    }
    .judge-btn.counted:hover { background: rgba(16,185,129,0.25); }
    .judge-btn.skipped {
      border-color: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.04);
    }
    .judge-btn.skipped:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.6); }
    .judge-btn.invalid {
      border-color: rgba(239,68,68,0.35);
      color: rgba(239,68,68,0.45);
      background: rgba(239,68,68,0.06);
      cursor: not-allowed;
    }
    .judge-btn.invalid:hover { border-color: rgba(239,68,68,0.35); color: rgba(239,68,68,0.45); }

    .row-counted td { opacity: 1; }
    .row-skipped .td-cat,
    .row-skipped .td-answer { opacity: 0.35; text-decoration: line-through; }
    .row-invalid .td-cat { opacity: 0.45; }
    .row-invalid .td-answer { opacity: 0.45; color: #f87171; text-decoration: line-through; }

    .play-again-wrap { text-align: center; }

    /* Mode buttons */
    .mode-btns {
      display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(167,139,250,0.5);
      color: #a78bfa; font-size: 1.1rem; font-weight: 700;
      padding: 14px 44px; border-radius: 50px; cursor: pointer;
      transition: transform 0.15s, background 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(167,139,250,0.15); border-color: #a78bfa;
      transform: translateY(-2px);
    }

    /* ============ LETTER PICKER SCREEN ============ */
    #screen-letter-pick { display: none; text-align: center; }
    .picker-title {
      font-size: 1.9rem; font-weight: 800; margin-bottom: 8px;
    }
    .picker-subtitle {
      font-size: 1rem; color: rgba(255,255,255,0.6);
      margin-bottom: 32px; line-height: 1.5;
    }
    .letter-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      max-width: 400px;
      margin: 0 auto 32px;
    }
    .letter-btn {
      aspect-ratio: 1;
      border: 2px solid rgba(167,139,250,0.35);
      border-radius: 16px;
      background: rgba(167,139,250,0.08);
      color: #fff;
      font-size: 1.8rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .letter-btn:hover {
      background: rgba(167,139,250,0.25);
      border-color: #a78bfa;
      transform: scale(1.08);
      box-shadow: 0 4px 20px rgba(167,139,250,0.4);
    }
    .letter-btn:active { transform: scale(0.97); }
    .picker-back {
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-size: 0.95rem; cursor: pointer; text-decoration: underline;
      transition: color 0.2s;
    }
    .picker-back:hover { color: #fff; }

    /* Utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="content">

  <!-- Back link -->
  <a href="../index.html" class="back-link">← Back to Arcade</a>

  <!-- SCREEN: MENU -->
  <div id="screen-menu">
    <h1 class="game-title">Scattergories</h1>
    <p class="game-subtitle" id="ui-subtitle"></p>

    <!-- Language toggle -->
    <div class="lang-bar">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')"><svg viewBox="0 0 60 30" style="width:1.4em;height:.7em;display:inline-block;vertical-align:-.1em;border-radius:2px" xmlns="http://www.w3.org/2000/svg"><clipPath id="a"><path d="M0 0v30h60V0z"/></clipPath><clipPath id="b"><path d="M30 15h30v15zv15H0zH0V0zV0h30z"/></clipPath><g clip-path="url(#a)"><path d="M0 0v30h60V0z" fill="#012169"/><path d="M0 0l60 30m0-30L0 30" stroke="#fff" stroke-width="6"/><path d="M0 0l60 30m0-30L0 30" clip-path="url(#b)" stroke="#C8102E" stroke-width="4"/><path d="M30 0v30M0 15h60" stroke="#fff" stroke-width="10"/><path d="M30 0v30M0 15h60" stroke="#C8102E" stroke-width="6"/></g></svg> English</button>
      <button class="lang-btn"        id="btn-de" onclick="setLang('de')"><svg viewBox="0 0 5 3" style="width:1.4em;height:.84em;display:inline-block;vertical-align:-.1em;border-radius:2px" xmlns="http://www.w3.org/2000/svg"><rect width="5" height="3" y="0" fill="#000"/><rect width="5" height="2" y="1" fill="#D00"/><rect width="5" height="1" y="2" fill="#FFCE00"/></svg> Deutsch</button>
    </div>

    <div class="mode-btns">
      <button class="btn-primary" onclick="startSolo()" id="btn-solo">Solo</button>
      <button class="btn-secondary" onclick="showLetterPicker()" id="btn-multi">Multiplayer</button>
    </div>
  </div>

  <!-- SCREEN: LETTER PICKER (multiplayer) -->
  <div id="screen-letter-pick">
    <h2 class="picker-title" id="picker-title">Pick a Letter</h2>
    <p class="picker-subtitle" id="picker-subtitle">Choose the letter for this round — everyone uses the same one</p>
    <div class="letter-grid" id="letter-grid"></div>
    <button class="picker-back" onclick="showScreen('screen-menu')" id="picker-back">← Back to menu</button>
  </div>

  <!-- SCREEN: PLAYING -->
  <div id="screen-play">
    <div class="play-header">
      <div class="letter-badge">
        <span id="ui-letter-label"></span>:&nbsp;<span class="big-letter" id="current-letter">B</span>
      </div>
      <div class="timer-wrap">
        <div class="timer-display" id="timer-display">2:00</div>
        <div class="timer-bar-track">
          <div class="timer-bar-fill" id="timer-bar"></div>
        </div>
      </div>
    </div>

    <div class="categories-grid" id="categories-grid"></div>

    <div class="submit-wrap">
      <button class="btn-submit" id="btn-submit" onclick="submitAnswers()"></button>
    </div>
  </div>

  <!-- SCREEN: RESULT -->
  <div id="screen-result">
    <div class="result-header">
      <div class="result-letter-badge">
        <span id="res-letter-label"></span>:&nbsp;<span class="big-letter" id="res-letter"></span>
      </div>
      <div class="score-block">
        <div class="score-number" id="res-score-number">0 / 9</div>
        <div class="score-label" id="res-score-label"></div>
      </div>
      <div class="grade-msg" id="res-grade"></div>
    </div>
    <p class="judge-hint" id="judge-hint"></p>
    <table class="results-table" id="results-table">
      <thead>
        <tr>
          <th id="th-cat">Category</th>
          <th id="th-answer">Your Answer</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="results-tbody"></tbody>
    </table>
    <div class="play-again-wrap">
      <button class="btn-primary" id="btn-play-again" onclick="playAgain()"></button>
    </div>
  </div>

</div><!-- .content -->

<script src="../scores.js"></script>
<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const LETTERS     = 'ABCDEFGHIJKLMNOPRSTW'.split('');
const FIXED_CATS  = ['city', 'country', 'animal', 'sport'];
const RANDOM_POOL = ['vip','instrument','clothing','school','food','movie','brand','job','body','fruit','boyname','girlname','capital','tvshow','band','kitchen','outside','hobby','vehicle','color'];
const TOTAL_SECONDS = 180;

// ─── STRINGS ─────────────────────────────────────────────────────────────────
const STRINGS = {
  en: {
    subtitle:    "Think of a word for each category — starting with the same letter!",
    letterLabel: "Letter",
    timeUp:      "Time's up!",
    submitBtn:   "Submit Answers",
    playAgain:   "Play Again",
    yourAnswer:  "Your Answer",
    judgeHint:   "Tap ✓ to count an answer or ✗ to skip it. Answers with the wrong first letter can't be counted.",
    scoreLabel:  "Score",
    soloBtn:     "Solo",
    multiBtn:    "Multiplayer",
    pickerTitle: "Pick a Letter",
    pickerSub:   "Choose the letter for this round — everyone uses the same one",
    pickerBack:  "← Back to menu",
    catLabels:   { city:"City", country:"Country", animal:"Animal", sport:"Sport",
                   vip:"Famous Person", instrument:"Music Instrument", clothing:"Clothing",
                   school:"In School", food:"Food & Drink", movie:"Movie", brand:"Brand / Company",
                   job:"Job / Profession", body:"Body Part", fruit:"Fruit or Vegetable",
                   boyname:"Boy's Name", girlname:"Girl's Name", capital:"Capital City",
                   tvshow:"TV Show", band:"Musical Artist / Band", kitchen:"Thing in a Kitchen",
                   outside:"Thing you Find Outside", hobby:"Hobby / Activity",
                   vehicle:"Vehicle", color:"Color" }
  },
  de: {
    subtitle:    "Denk dir für jede Kategorie ein Wort aus — das mit dem gleichen Buchstaben beginnt!",
    letterLabel: "Buchstabe",
    timeUp:      "Zeit abgelaufen!",
    submitBtn:   "Antworten abgeben",
    playAgain:   "Nochmal spielen",
    yourAnswer:  "Deine Antwort",
    judgeHint:   "Tippe ✓ um eine Antwort zu zählen oder ✗ um sie zu überspringen. Antworten mit falschem Anfangsbuchstaben können nicht gezählt werden.",
    scoreLabel:  "Punkte",
    soloBtn:     "Solo",
    multiBtn:    "Mehrspieler",
    pickerTitle: "Buchstabe wählen",
    pickerSub:   "Wähle den Buchstaben für diese Runde — alle spielen mit demselben",
    pickerBack:  "← Zurück zum Menü",
    catLabels:   { city:"Stadt", country:"Land", animal:"Tier", sport:"Sport",
                   vip:"Prominente Person", instrument:"Musikinstrument", clothing:"Kleidung",
                   school:"In der Schule", food:"Essen & Trinken", movie:"Film", brand:"Marke / Firma",
                   job:"Beruf", body:"Körperteil", fruit:"Obst oder Gemüse",
                   boyname:"Männlicher Name", girlname:"Weiblicher Name", capital:"Hauptstadt",
                   tvshow:"Fernsehserie", band:"Musiker / Band", kitchen:"Dinge in der Küche",
                   outside:"Dinge draußen", hobby:"Hobby / Aktivität",
                   vehicle:"Fahrzeug", color:"Farbe" }
  }
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let lang          = 'en';
let currentLetter = 'B';
let timerInterval = null;
let secondsLeft   = TOTAL_SECONDS;
let activeCats      = [...FIXED_CATS];
let multiplayerMode = false;

// ─── STARS ────────────────────────────────────────────────────────────────────
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*6).toFixed(1)}s`;
    container.appendChild(s);
  }
})();

// ─── LANGUAGE ─────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-de').classList.toggle('active', l === 'de');
  renderUI();
}

function renderUI() {
  const s = STRINGS[lang];
  document.getElementById('ui-subtitle').textContent      = s.subtitle;
  document.getElementById('ui-letter-label').textContent  = s.letterLabel;
  document.getElementById('res-letter-label').textContent = s.letterLabel;
  document.getElementById('btn-submit').textContent       = s.submitBtn;
  document.getElementById('btn-play-again').textContent   = s.playAgain;
  document.getElementById('btn-solo').textContent         = s.soloBtn;
  document.getElementById('btn-multi').textContent        = s.multiBtn;
  document.getElementById('picker-title').textContent     = s.pickerTitle;
  document.getElementById('picker-subtitle').textContent  = s.pickerSub;
  document.getElementById('picker-back').textContent      = s.pickerBack;
  document.getElementById('th-cat').textContent           = lang === 'de' ? 'Kategorie' : 'Category';
  document.getElementById('th-answer').textContent        = s.yourAnswer;
  document.getElementById('judge-hint').textContent       = s.judgeHint;
  document.getElementById('res-score-label').textContent  = s.scoreLabel;
  // Re-render category labels if play screen is visible
  activeCats.forEach(cat => {
    const lbl = document.getElementById('label-' + cat);
    if (lbl) lbl.textContent = s.catLabels[cat];
  });
}

// ─── SCREEN HELPERS ───────────────────────────────────────────────────────────
function showScreen(id) {
  ['screen-menu','screen-letter-pick','screen-play','screen-result'].forEach(s => {
    document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
  });
}

// ─── GAME FLOW ────────────────────────────────────────────────────────────────
function startSolo() {
  multiplayerMode = false;
  startGame(LETTERS[Math.floor(Math.random() * LETTERS.length)]);
}

function showLetterPicker() {
  multiplayerMode = true;
  const grid = document.getElementById('letter-grid');
  grid.innerHTML = '';
  LETTERS.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.textContent = letter;
    btn.addEventListener('click', () => startGame(letter));
    grid.appendChild(btn);
  });
  showScreen('screen-letter-pick');
}

function startGame(letter) {
  stopTimer();
  currentLetter = letter;
  document.getElementById('current-letter').textContent = currentLetter;
  document.getElementById('res-letter').textContent     = currentLetter;
  // Pick 5 random categories from pool (shuffle + slice)
  const shuffled = [...RANDOM_POOL].sort(() => Math.random() - 0.5);
  activeCats = [...FIXED_CATS, ...shuffled.slice(0, 5)];
  buildGrid();
  renderUI();
  secondsLeft = TOTAL_SECONDS;
  updateTimerDisplay();
  showScreen('screen-play');
  // focus first input
  const first = document.querySelector('.cat-input');
  if (first) setTimeout(() => first.focus(), 100);
  startTimer();
}

function buildGrid() {
  const grid = document.getElementById('categories-grid');
  grid.innerHTML = '';
  const s = STRINGS[lang];
  activeCats.forEach(cat => {
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `
      <span class="cat-label" id="label-${cat}">${s.catLabels[cat]}</span>
      <input class="cat-input" id="input-${cat}" type="text"
             placeholder="${currentLetter.toLowerCase()}…"
             autocomplete="off" spellcheck="false" />
    `;
    grid.appendChild(row);
  });
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function startTimer() {
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      stopTimer();
      submitAnswers(true);
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  const disp = document.getElementById('timer-display');
  const bar  = document.getElementById('timer-bar');
  const pct  = (secondsLeft / TOTAL_SECONDS) * 100;
  disp.textContent = `${m}:${String(s).padStart(2,'0')}`;
  bar.style.width  = pct + '%';

  const cls = secondsLeft <= 10 ? 'danger' : secondsLeft <= 30 ? 'warning' : '';
  disp.className = 'timer-display' + (cls ? ' ' + cls : '');
  bar.className  = 'timer-bar-fill' + (cls ? ' ' + cls : '');
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
function submitAnswers(timedOut = false) {
  stopTimer();
  if (timedOut) {
    const disp = document.getElementById('timer-display');
    disp.textContent = STRINGS[lang].timeUp;
    disp.className = 'timer-display danger';
  }

  const results = activeCats.map(cat => ({
    cat,
    answer: document.getElementById('input-' + cat).value.trim(),
  }));

  renderResults(results);
  showScreen('screen-result');
}

function renderResults(results) {
  const s = STRINGS[lang];

  document.getElementById('res-letter').textContent        = currentLetter;
  document.getElementById('res-letter-label').textContent  = s.letterLabel;
  document.getElementById('res-score-label').textContent   = s.scoreLabel;
  document.getElementById('th-answer').textContent         = s.yourAnswer;
  document.getElementById('judge-hint').textContent        = s.judgeHint;
  document.getElementById('btn-play-again').textContent    = s.playAgain;

  const tbody = document.getElementById('results-tbody');
  tbody.innerHTML = '';

  results.forEach(r => {
    const hasAnswer   = r.answer.length > 0;
    const firstLetter = r.answer.trim()[0] || '';
    const validLetter = firstLetter.toUpperCase() === currentLetter;
    const blocked     = !hasAnswer || !validLetter; // empty or wrong letter → can't count
    const counted     = !blocked;                   // non-empty and correct letter

    const tr = document.createElement('tr');
    tr.className       = blocked ? 'row-invalid' : 'row-counted';
    tr.dataset.counted = counted ? 'true' : 'false';

    const btn = document.createElement('button');
    if (blocked) {
      btn.className   = 'judge-btn invalid';
      btn.textContent = '✗';
      btn.setAttribute('aria-label', 'Cannot count');
      btn.disabled = true;
    } else {
      btn.className = 'judge-btn counted';
      btn.textContent = '✓';
      btn.setAttribute('aria-label', 'Count');
      btn.addEventListener('click', () => {
        const isCounted = tr.dataset.counted === 'true';
        const nowCounted = !isCounted;
        tr.dataset.counted  = nowCounted ? 'true' : 'false';
        tr.className        = nowCounted ? 'row-counted' : 'row-skipped';
        btn.className       = 'judge-btn ' + (nowCounted ? 'counted' : 'skipped');
        btn.textContent     = nowCounted ? '✓' : '✗';
        btn.setAttribute('aria-label', nowCounted ? 'Count' : 'Skip');
        updateJudgeScore();
      });
    }

    const tdCat    = document.createElement('td');
    tdCat.className = 'td-cat';
    tdCat.textContent = s.catLabels[r.cat];

    const tdAns    = document.createElement('td');
    tdAns.className = 'td-answer';
    tdAns.textContent = r.answer || '—';

    const tdJudge  = document.createElement('td');
    tdJudge.className = 'td-judge';
    tdJudge.appendChild(btn);

    tr.appendChild(tdCat);
    tr.appendChild(tdAns);
    tr.appendChild(tdJudge);
    tbody.appendChild(tr);
  });

  updateJudgeScore();
}

function updateJudgeScore() {
  const rows  = document.querySelectorAll('#results-tbody tr');
  const score = [...rows].filter(r => r.dataset.counted === 'true').length;
  const total = rows.length;

  document.getElementById('res-score-number').textContent = `${score} / ${total}`;

  const grade = getGrade(score, total);
  document.getElementById('res-grade').textContent = grade;
}

function getGrade(score, total) {
  const pct = score / total;
  if (lang === 'en') {
    if (pct === 1)    return 'Perfect!';
    if (pct >= 0.77)  return 'Excellent!';
    if (pct >= 0.55)  return 'Good job!';
    if (pct >= 0.33)  return 'Keep practicing!';
    return 'Better luck next time!';
  } else {
    if (pct === 1)    return 'Perfekt!';
    if (pct >= 0.77)  return 'Ausgezeichnet!';
    if (pct >= 0.55)  return 'Gut gemacht!';
    if (pct >= 0.33)  return 'Weiter üben!';
    return 'Nächstes Mal klappt\'s!';
  }
}

function playAgain() {
  // Save whatever score the player approved before starting over
  const rows  = document.querySelectorAll('#results-tbody tr');
  const score = [...rows].filter(r => r.dataset.counted === 'true').length;
  ArcadeScores.save('scattergories', score, lang);
  if (multiplayerMode) {
    showLetterPicker();
  } else {
    startSolo();
  }
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderUI();
showScreen('screen-menu');
</script>
</body>
</html>
